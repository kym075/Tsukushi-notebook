name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Build EXE
        run: python -m PyInstaller --clean --noconfirm TukushiNote.spec

      - name: Create SHA-256 checksum
        run: |
          $hash = (Get-FileHash dist/TukushiNote.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  TukushiNote.exe" | Out-File -Encoding ascii dist/TukushiNote.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TukushiNote-Windows
          path: |
            dist/TukushiNote.exe
            dist/TukushiNote.exe.sha256

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:GITHUB_REF_NAME 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:GITHUB_REF_NAME --title $env:GITHUB_REF_NAME --notes "Windows build"
          }
          gh release upload $env:GITHUB_REF_NAME dist/TukushiNote.exe dist/TukushiNote.exe.sha256 --clobber
